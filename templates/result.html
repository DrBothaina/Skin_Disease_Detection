{% extends "base.html" %}

{% block content %}

<div class="container mt-0 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

```
        <div class="card shadow-lgcontainer mt-1 mb-5 border-0">

            <!-- Header -->
            <div class="card-header bg-primary text-white text-center py-3">
                <h2 class="card-title mb-0">Classification Result</h2>
            </div>

            <div class="card-body text-center p-4">

                <!-- Uploaded Image -->
                <img src="{{ image_url }}" 
                     alt="Uploaded Image"
                     class="img-fluid rounded mb-4"
                     style="max-height:300px;">

                <!-- Prediction -->
                <h5 class="mb-3">
                    Skin Disease:
                    <strong>{{ prediction }}</strong>
                </h5>

                <!-- Confidence Progress Bar -->
                <div class="progress mb-4" style="height: 25px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                         role="progressbar"
                         style="width: {{ confidence }}%;"
                         aria-valuenow="{{ confidence }}"
                         aria-valuemin="0"
                         aria-valuemax="100">

                         {{ confidence }}%

                    </div>
                </div>

                <!-- Learn More Button -->
                <a href="{{ url_for('disease_info', disease_name=prediction) }}"
                   class="btn btn-primary">
                    Learn More About {{ prediction }}
                </a>

                <!-- Back Button -->
                <div class="mt-3">
                    <a href="{{ url_for('classify') }}" class="btn btn-outline-secondary">
                        Classify Another Image
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>
```

</div>
{% endblock %}
